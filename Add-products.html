<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAHAN DATA - Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #3d9ce0 0%, #73c2f0 100%); min-height: 100vh; padding: 2rem 1rem; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.5rem; color: white; display: flex; align-items: center; justify-content: center; gap: 1rem; }
        .header p { color: #ffd966; font-size: 1rem; }
        .tabs { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 2rem; padding: 0.6rem 1.5rem; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: white; color: #1e3c72; }
        .tab-content { background: white; border-radius: 1.5rem; padding: 1.5rem; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .table-wrapper { overflow-x: auto; margin: 1rem 0; }
        .responsive-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .responsive-table th, .responsive-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #edf2f7; }
        .responsive-table th { background: #ffd966; color: #2c3e66; }
        .status-badge { padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; font-weight: bold; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        select, input, textarea { padding: 0.4rem; border-radius: 0.5rem; border: 1px solid #ccc; }
        button { background: #f59e0b; color: white; border: none; padding: 0.4rem 1rem; border-radius: 1rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #d97706; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 0.3rem; color: #1e3c72; }
        .form-group input { width: 100%; padding: 0.6rem; border-radius: 0.8rem; border: 1px solid #ccc; }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .edit-btn { background: #28a745; margin-right: 0.3rem; }
        .edit-btn:hover { background: #218838; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #c82333; }
        .footer { margin-top: 2rem; background: #ffd966; border-radius: 1rem; padding: 1rem; text-align: center; color: #2c3e66; font-size: 0.75rem; }
        .access-denied { text-align: center; padding: 3rem; background: white; border-radius: 2rem; max-width: 500px; margin: 2rem auto; }
        .access-denied h2 { color: #dc2626; margin-bottom: 1rem; }
        @media (max-width: 700px) {
            .header h1 { font-size: 1.8rem; }
            .form-group input { padding: 0.5rem; }
        }
    </style>
</head>
<body>
<div id="app" style="display: none;">
    <div class="container">
        <div class="header">
            <h1><span class="trophy">⭐</span> SAHAN DATA <span class="trophy">⭐</span></h1>
            <p>Admin Panel</p>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="orders">📦 Orders Management</button>
            <button class="tab-btn" data-tab="products">🛒 Products Management</button>
        </div>

        <!-- Orders Tab -->
        <div id="orders" class="tab-content active">
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
                <input type="text" id="orderSearch" placeholder="Search order # or customer" style="flex:1; padding:0.5rem;">
                <select id="orderStatusFilter" style="padding:0.5rem;">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                    <option value="rejected">Rejected</option>
                </select>
                <button id="refreshOrdersBtn">Refresh</button>
            </div>
            <div class="table-wrapper">
                <table class="responsive-table" id="ordersTable">
                    <thead><tr><th>Order #</th><th>Customer</th><th>Phone</th><th>Product</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody id="ordersTableBody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- Products Tab with Add Product Form -->
        <div id="products" class="tab-content">
            <div style="background: #f8f9fa; padding: 1.2rem; border-radius: 1rem; margin-bottom: 1.5rem;">
                <h4 style="margin-bottom: 1rem;">➕ Add New Product</h4>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 0.8rem;">
                    <div class="form-group"><label>Product Name</label><input type="text" id="prodName" placeholder="e.g., 10 GB Internet"></div>
                    <div class="form-group"><label>Provider</label><input type="text" id="prodProvider" placeholder="Hormuud / Somtel / etc."></div>
                    <div class="form-group"><label>Price (USD)</label><input type="number" id="prodPrice" step="0.01" placeholder="10.00"></div>
                    <div class="form-group"><label>Amount (cents)</label><input type="number" id="prodAmountCents" placeholder="1000"></div>
                    <div class="form-group"><label>Image URL (optional)</label><input type="text" id="prodImage" placeholder="https://..."></div>
                    <div><button id="addProductBtn" style="margin-top: 1.5rem;">➕ Add Product</button></div>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="responsive-table" id="productsTable">
                    <thead><tr><th>ID</th><th>Image</th><th>Name</th><th>Provider</th><th>Price</th><th>Amount (cents)</th><th>Actions</th></tr></thead>
                    <tbody id="productsTableBody"><tr><td colspan="7" class="loading">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 SAHAN DATA - Admin Panel</p>
        </div>
    </div>
</div>
<div id="accessDenied" class="access-denied" style="display: none;">
    <h2>⛔ Access Denied</h2>
    <p>You do not have permission to view this page.</p>
    <p><a href="login.html">Login as Admin</a> or <a href="index.html">Return to Home</a></p>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://xccbmivhcbukqyplstae.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjY2JtaXZoY2J1a3F5cGxzdGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTcyNTIsImV4cCI6MjA4NjkzMzI1Mn0.lGr3cDItP1-LVJgzd5wW5gp0HsGUonuZj-T9qGL2nF0';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUserIsAdmin = false;

        async function checkAdmin() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return false; }
            const { data: adminCheck } = await sb.from('customers').select('is_admin').eq('uid', user.id).single();
            if (!adminCheck || !adminCheck.is_admin) {
                document.getElementById('accessDenied').style.display = 'block';
                document.getElementById('app').style.display = 'none';
                return false;
            }
            document.getElementById('app').style.display = 'block';
            return true;
        }

        // ---------- Orders ----------
        async function loadOrders() {
            const search = document.getElementById('orderSearch').value.toLowerCase();
            const statusFilter = document.getElementById('orderStatusFilter').value;
            let { data, error } = await sb.from('orders').select(`
                id, order_number, customer_phone, amount, status, created_at,
                customers(full_name),
                products(name)
            `).order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            if (search) {
                data = data.filter(o => o.order_number.toLowerCase().includes(search) || (o.customers?.full_name || '').toLowerCase().includes(search));
            }
            if (statusFilter !== 'all') {
                data = data.filter(o => o.status === statusFilter);
            }
            const tbody = document.getElementById('ordersTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">No orders found</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(order => `
                <tr>
                    <td>${escapeHtml(order.order_number)}</td>
                    <td>${escapeHtml(order.customers?.full_name || 'Guest')}</td>
                    <td>${escapeHtml(order.customer_phone)}</td>
                    <td>${escapeHtml(order.products?.name || '-')}</td>
                    <td>$${order.amount}</td>
                    <td><span class="status-badge status-${order.status}">${order.status}</span></td>
                    <td>
                        <select class="status-select" data-id="${order.id}">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="completed" ${order.status === 'completed' ? 'selected' : ''}>Completed</option>
                            <option value="rejected" ${order.status === 'rejected' ? 'selected' : ''}>Rejected</option>
                        </select>
                        <button class="update-status-btn" data-id="${order.id}">Update</button>
                    </td>
                </tr>
            `).join('');
            document.querySelectorAll('.update-status-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const orderId = btn.dataset.id;
                    const select = btn.parentElement.querySelector('.status-select');
                    const newStatus = select.value;
                    await sb.from('orders').update({ status: newStatus }).eq('id', orderId);
                    loadOrders();
                });
            });
        }

        // ---------- Products ----------
        let editingProductId = null;
        async function loadProducts() {
            const { data, error } = await sb.from('products').select('*').order('id');
            const tbody = document.getElementById('productsTableBody');
            if (error || !data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="loading">No products</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(prod => `
                <tr id="product-row-${prod.id}">
                    <td>${prod.id}</td>
                    <td>${prod.image_url ? `<img src="${escapeHtml(prod.image_url)}" class="product-img" alt="product">` : 'No image'}</td>
                    <td class="editable-name">${escapeHtml(prod.name)}</td>
                    <td class="editable-provider">${escapeHtml(prod.provider)}</td>
                    <td class="editable-price">$${prod.price}</td>
                    <td class="editable-cents">${prod.amount_cents}</td>
                    <td>
                        <button class="edit-product-btn" data-id="${prod.id}" data-name="${escapeHtml(prod.name)}" data-provider="${escapeHtml(prod.provider)}" data-price="${prod.price}" data-cents="${prod.amount_cents}" data-image="${escapeHtml(prod.image_url || '')}">✏️ Edit</button>
                        <button class="delete-product-btn" data-id="${prod.id}">🗑️ Delete</button>
                    </td>
                </tr>
            `).join('');
            // Edit button handlers
            document.querySelectorAll('.edit-product-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const name = btn.dataset.name;
                    const provider = btn.dataset.provider;
                    const price = btn.dataset.price;
                    const cents = btn.dataset.cents;
                    const image = btn.dataset.image;
                    // Populate form for editing
                    document.getElementById('prodName').value = name;
                    document.getElementById('prodProvider').value = provider;
                    document.getElementById('prodPrice').value = price;
                    document.getElementById('prodAmountCents').value = cents;
                    document.getElementById('prodImage').value = image;
                    editingProductId = id;
                    document.getElementById('addProductBtn').innerText = '✏️ Update Product';
                });
            });
            // Delete button handlers
            document.querySelectorAll('.delete-product-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm('Delete this product?')) {
                        await sb.from('products').delete().eq('id', btn.dataset.id);
                        loadProducts();
                    }
                });
            });
        }

        async function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            const provider = document.getElementById('prodProvider').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const amount_cents = parseInt(document.getElementById('prodAmountCents').value);
            const image_url = document.getElementById('prodImage').value.trim() || null;
            if (!name || !provider || isNaN(price) || isNaN(amount_cents) || price <= 0 || amount_cents <= 0) {
                alert('Please fill all fields correctly (price > 0, amount > 0)');
                return;
            }
            if (editingProductId) {
                // Update existing product
                const { error } = await sb.from('products').update({ name, provider, price, amount_cents, image_url }).eq('id', editingProductId);
                if (error) alert(error.message);
                else {
                    editingProductId = null;
                    document.getElementById('addProductBtn').innerText = '➕ Add Product';
                    clearProductForm();
                    loadProducts();
                }
            } else {
                // Insert new product
                const { error } = await sb.from('products').insert([{ name, provider, price, amount_cents, image_url }]);
                if (error) alert(error.message);
                else {
                    clearProductForm();
                    loadProducts();
                }
            }
        }

        function clearProductForm() {
            document.getElementById('prodName').value = '';
            document.getElementById('prodProvider').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodAmountCents').value = '';
            document.getElementById('prodImage').value = '';
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        // Tabs
        function initTabs() {
            const btns = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.dataset.tab;
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    contents.forEach(c => c.classList.remove('active'));
                    document.getElementById(tabId).classList.add('active');
                    if (tabId === 'orders') loadOrders();
                    if (tabId === 'products') loadProducts();
                });
            });
        }

        async function init() {
            const isAdmin = await checkAdmin();
            if (!isAdmin) return;
            await loadOrders();
            await loadProducts();
            initTabs();
            document.getElementById('refreshOrdersBtn').addEventListener('click', loadOrders);
            document.getElementById('orderSearch').addEventListener('input', loadOrders);
            document.getElementById('orderStatusFilter').addEventListener('change', loadOrders);
            document.getElementById('addProductBtn').addEventListener('click', saveProduct);
        }

        init();
    })();
</script>
</body>
</html>
