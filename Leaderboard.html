<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SAHAN DATA – Leaderboard | Tartamada Socda</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 30%, #0a0f1e, #03060c);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      padding: 2rem 1.5rem;
      color: #eef5ff;
    }

    .leaderboard-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .leaderboard-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .leaderboard-header h1 {
      font-size: 2.6rem;
      background: linear-gradient(135deg, #FFD966, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }
    .sub {
      color: #9aaec5;
      margin-top: 8px;
      font-size: 0.95rem;
      border-top: 1px solid rgba(255,215,0,0.3);
      display: inline-block;
      padding-top: 8px;
    }
    .info-note {
      background: rgba(0,0,0,0.4);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 60px;
      font-size: 0.7rem;
      margin-top: 12px;
      color: #ffdfaa;
    }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .leader-card {
      background: rgba(20, 30, 45, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 215, 0, 0.2);
      padding: 1.5rem 1.2rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
    }
    .leader-card:hover {
      border-color: rgba(255, 200, 80, 0.5);
      background: rgba(30, 42, 62, 0.65);
    }

    .card-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1.2rem;
      border-bottom: 2px dashed rgba(255,200,100,0.3);
      padding-bottom: 0.7rem;
    }
    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title span:first-child {
      font-size: 1.8rem;
    }

    .filter-area {
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(0,0,0,0.4);
      padding: 0.3rem 0.8rem;
      border-radius: 60px;
    }
    .filter-area input {
      background: rgba(255,255,240,0.15);
      border: 1px solid rgba(255,215,0,0.4);
      padding: 0.4rem 0.9rem;
      border-radius: 40px;
      color: white;
      font-size: 0.85rem;
      outline: none;
      width: 170px;
      transition: 0.2s;
    }
    .filter-area input:focus {
      border-color: #ffb347;
      background: rgba(0,0,0,0.6);
    }
    .filter-area input::placeholder {
      color: #bbccff;
      font-size: 0.75rem;
    }
    .reset-btn {
      background: none;
      border: 1px solid #ffb347;
      color: #ffd966;
      border-radius: 30px;
      padding: 0.3rem 0.9rem;
      font-size: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .reset-btn:hover {
      background: #ffb34720;
    }

    .rank-table {
      width: 100%;
      margin-top: 0.5rem;
    }
    .rank-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0.5rem;
      border-bottom: 1px solid rgba(255,255,200,0.1);
      font-size: 0.95rem;
      flex-wrap: wrap;
      gap: 8px;
    }
    .rank-row:last-child {
      border-bottom: none;
    }
    .rank-number {
      font-weight: bold;
      width: 45px;
      color: #ffd966;
      text-shadow: 0 0 2px gold;
    }
    .rank-name {
      flex: 2;
      font-weight: 500;
      letter-spacing: 0.3px;
      word-break: break-word;
    }
    .progress-bar-bg {
      flex: 3;
      background: rgba(0,0,0,0.45);
      border-radius: 40px;
      height: 24px;
      overflow: hidden;
      min-width: 130px;
    }
    .progress-fill {
      background: linear-gradient(90deg, #f0a500, #ffcd7e);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
      color: #1e1a0c;
      font-weight: bold;
      font-size: 0.7rem;
    }
    .rank-value {
      width: 85px;
      text-align: right;
      font-weight: 600;
      color: #f3d382;
    }

    .loading-placeholder {
      text-align: center;
      padding: 2rem;
      color: #ffd966;
      font-style: italic;
    }

    @media (max-width: 760px) {
      body {
        padding: 1rem;
      }
      .rank-row {
        flex-direction: column;
        align-items: stretch;
      }
      .progress-bar-bg {
        width: 100%;
      }
      .rank-value {
        text-align: left;
        width: auto;
      }
      .card-header {
        flex-direction: column;
        gap: 12px;
      }
      .filter-area {
        width: 100%;
        justify-content: space-between;
      }
      .filter-area input {
        width: 100%;
      }
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-top: 1rem;
    }
    .footer-links a {
      color: #ffd966;
      text-decoration: none;
      font-size: 0.7rem;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="leaderboard-container">
  <div class="leaderboard-header">
    <h1>🏆 LEADERBOARD</h1>
    <div class="sub">✧ Tartamada socda (ongoing competitions) ✧</div>
    <div class="info-note">📌 Guuleystayaasha rasmiga ah waxaa lagu muujiyaa <strong>rewards.html</strong></div>
  </div>

  <div class="cards-grid" id="leaderboardRoot">
    <div class="loading-placeholder">⏳ Loading leaderboard data from backend...</div>
  </div>
  
  <footer>
    👑 Hal guuleyste rasmi ah tartan kasta | Leaderboard waa tusmo tartamada hadda socda
    <div class="footer-links">
      <a href="index.html">Home</a> | <a href="dashboard.html">Dashboard</a> | <a href="rewards.html">Rewards</a> | <a href="login.html">Login</a> | <a href="register.html">Register</a>
    </div>
  </footer>
</div>

<script>
  // ======================== SUPABASE CONFIGURATION ========================
  const SUPABASE_URL = 'https://xccbmivhcbukqyplstae.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjY2JtaXZoY2J1a3F5cGxzdGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTcyNTIsImV4cCI6MjA4NjkzMzI1Mn0.lGr3cDItP1-LVJgzd5wW5gp0HsGUonuZj-T9qGL2nF0';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Helper: escape HTML
  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
  }

  // ======================== DATA FETCHING FUNCTIONS ========================
  async function fetchWeeklyReferrers() {
    const { data, error } = await sb.rpc('get_weekly_top_referrers');
    if (error) throw error;
    if (!data || data.length === 0) return [];
    return data.slice(0,3).map((item, idx) => ({
      rank: idx+1,
      name: item.full_name || item.name || 'Unknown',
      value: item.referral_count || item.count || 0,
      unit: 'referrals'
    }));
  }

  async function fetchMonthlyPromoted() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const { data, error } = await sb.rpc('get_monthly_top_promoted', { p_year: year, p_month: month });
    if (error) throw error;
    if (!data || data.length === 0) return [];
    return data.slice(0,5).map((item, idx) => ({
      rank: idx+1,
      name: item.full_name || item.name || 'Unknown',
      value: item.usage_count || item.count || 0,
      unit: 'uses'
    }));
  }

  async function fetchMonthlySellers() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth() + 1;
    const { data, error } = await sb.rpc('get_monthly_top_seller', { p_year: year, p_month: month });
    if (error) throw error;
    let sellers = [];
    if (data && Array.isArray(data)) sellers = data;
    else if (data && typeof data === 'object') sellers = [data];
    if (sellers.length === 0) return [];
    return sellers.slice(0,5).map((item, idx) => ({
      rank: idx+1,
      name: item.full_name || item.name || 'Unknown',
      value: item.order_count || item.count || 0,
      unit: 'orders'
    }));
  }

  async function fetchTopDistricts() {
    const { data, error } = await sb.rpc('get_top_districts');
    if (error) throw error;
    if (!data || data.length === 0) return [];
    return data.slice(0,5).map((item, idx) => ({
      rank: idx+1,
      name: item.district || item.name || 'Unknown',
      value: item.total_orders || item.count || 0,
      unit: 'orders'
    }));
  }

  async function fetchTopGroups() {
    const { data, error } = await sb.rpc('get_top_groups');
    if (error) throw error;
    if (!data || data.length === 0) return [];
    return data.slice(0,5).map((item, idx) => ({
      rank: idx+1,
      name: item.group_code || item.name || 'Unknown',
      value: item.total_orders || item.count || 0,
      unit: 'orders'
    }));
  }

  async function fetchTopSchools() {
    const { data, error } = await sb.rpc('get_top_schools');
    if (error) throw error;
    if (!data || data.length === 0) return [];
    return data.slice(0,5).map((item, idx) => ({
      rank: idx+1,
      name: item.school || item.name || 'Unknown',
      value: item.total_orders || item.count || 0,
      unit: 'orders'
    }));
  }

  // ======================== RENDER LOGIC ========================
  let leaderboardData = {
    weeklyReferrers: { title: "📅 WEEKLY TOP REFERRERS (This Week)", rows: [] },
    monthlyPromoted: { title: `📢 MONTHLY TOP PROMOTED (${new Date().toLocaleString('default', { month: 'long', year: 'numeric' })})`, rows: [] },
    monthlySellers: { title: `💰 MONTHLY TOP SELLERS (${new Date().toLocaleString('default', { month: 'long', year: 'numeric' })})`, rows: [] },
    annualDistricts: { title: "🏙️ ANNUAL TOP DISTRICTS (All-time)", rows: [] },
    annualGroups: { title: "👥 ANNUAL TOP GROUPS (All-time)", rows: [] },
    annualSchools: { title: "🏫 ANNUAL TOP SCHOOLS (All-time)", rows: [] }
  };

  let filters = {
    weeklyReferrers: "",
    monthlyPromoted: "",
    monthlySellers: "",
    annualDistricts: "",
    annualGroups: "",
    annualSchools: ""
  };

  function getMaxValue(rows) {
    if (!rows.length) return 100;
    return rows[0].value;
  }

  function renderCard(sectionKey, filterText, sectionData) {
    if (!sectionData || !sectionData.rows) return null;
    let filteredRows = [...sectionData.rows];
    if (filterText && filterText.trim() !== "") {
      const lowerFilter = filterText.toLowerCase();
      filteredRows = filteredRows.filter(row => row.name.toLowerCase().includes(lowerFilter));
    }
    const maxVal = getMaxValue(sectionData.rows);
    
    const cardDiv = document.createElement('div');
    cardDiv.className = 'leader-card';
    cardDiv.setAttribute('data-section', sectionKey);
    
    const headerHtml = `
      <div class="card-header">
        <div class="card-title">
          <span>${sectionData.title.split(' ')[0]}</span>
          <span>${sectionData.title.substring(sectionData.title.indexOf(' ')+1)}</span>
        </div>
        <div class="filter-area">
          <input type="text" class="search-input" placeholder="🔍 Filter..." data-section="${sectionKey}" value="${escapeHtml(filterText)}">
          <button class="reset-btn" data-section="${sectionKey}">Reset</button>
        </div>
      </div>
      <div class="rank-table">
        ${filteredRows.map(row => {
          const percent = (row.value / maxVal) * 100;
          return `
            <div class="rank-row">
              <div class="rank-number">${row.rank}.</div>
              <div class="rank-name">${escapeHtml(row.name)}</div>
              <div class="progress-bar-bg">
                <div class="progress-fill" style="width: ${percent}%;">${percent > 20 ? Math.round(percent)+'%' : ''}</div>
              </div>
              <div class="rank-value">${row.value} ${row.unit}</div>
            </div>
          `;
        }).join('')}
        ${filteredRows.length === 0 ? '<div class="rank-row" style="justify-content:center; opacity:0.7;">🚀 Ma jiraan wax ku habboon filterka</div>' : ''}
      </div>
    `;
    cardDiv.innerHTML = headerHtml;
    return cardDiv;
  }

  function renderAll() {
    const root = document.getElementById('leaderboardRoot');
    if (!root) return;
    root.innerHTML = '';
    const keys = ['weeklyReferrers', 'monthlyPromoted', 'monthlySellers', 'annualDistricts', 'annualGroups', 'annualSchools'];
    for (let k of keys) {
      const card = renderCard(k, filters[k], leaderboardData[k]);
      if (card) root.appendChild(card);
    }
    attachEventListeners();
  }

  function attachEventListeners() {
    document.querySelectorAll('.search-input').forEach(input => {
      const section = input.getAttribute('data-section');
      if (section) {
        const newInput = input.cloneNode(true);
        input.parentNode.replaceChild(newInput, input);
        newInput.addEventListener('input', (e) => {
          filters[section] = e.target.value;
          renderAll();
        });
      }
    });
    document.querySelectorAll('.reset-btn').forEach(btn => {
      const section = btn.getAttribute('data-section');
      if (section) {
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.addEventListener('click', () => {
          filters[section] = "";
          renderAll();
        });
      }
    });
  }

  async function loadAllData() {
    try {
      const [ref, prom, sell, dist, grp, sch] = await Promise.all([
        fetchWeeklyReferrers(),
        fetchMonthlyPromoted(),
        fetchMonthlySellers(),
        fetchTopDistricts(),
        fetchTopGroups(),
        fetchTopSchools()
      ]);
      leaderboardData.weeklyReferrers.rows = ref;
      leaderboardData.monthlyPromoted.rows = prom;
      leaderboardData.monthlySellers.rows = sell;
      leaderboardData.annualDistricts.rows = dist;
      leaderboardData.annualGroups.rows = grp;
      leaderboardData.annualSchools.rows = sch;
      renderAll();
    } catch (err) {
      console.error('Error loading leaderboard:', err);
      const root = document.getElementById('leaderboardRoot');
      if (root) {
        root.innerHTML = `<div class="loading-placeholder" style="color:#ff8888;">❌ Failed to load data: ${err.message || 'Unknown error'}.<br><br>🔧 Please check that RPC functions exist in your Supabase backend.</div>`;
      }
    }
  }

  loadAllData();
</script>
</body>
</html>
