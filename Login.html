<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAHAN DATA - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: linear-gradient(145deg, #3d9ce0 0%, #73c2f0 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .card { background: white; max-width: 450px; width: 100%; border-radius: 2rem; padding: 2rem; box-shadow: 0 20px 35px rgba(0,0,0,0.1); text-align: center; }
        .card h1 { color: #b45f06; margin-bottom: 0.5rem; }
        .card p { color: #a0522d; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #5a3e1b; margin-bottom: 0.3rem; }
        .input-group input { width: 100%; padding: 0.7rem 1rem; border-radius: 1.5rem; border: 1px solid #e0b354; background: rgba(255,255,240,0.9); }
        .btn { width: 100%; background: #e69500; color: white; border: none; border-radius: 2rem; padding: 0.7rem; font-weight: bold; cursor: pointer; margin-top: 0.5rem; }
        .btn:hover { background: #cc7a00; }
        .message { margin: 1rem 0; padding: 0.5rem; border-radius: 1rem; font-size: 0.8rem; display: none; }
        .footer-links { margin-top: 1rem; font-size: 0.7rem; }
        .footer-links a { color: #b45f06; text-decoration: none; margin: 0 0.5rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>⭐ SAHAN DATA ⭐</h1>
    <p>ku soo biir xidigaha suuq-geynta</p>
    <div id="message" class="message"></div>
    <div class="input-group"><label>📱 Promo code ama Email</label><input type="text" id="identifier" placeholder="Email ama promo code (e.g., 68)"></div>
    <div class="input-group"><label>🔒 Password</label><input type="password" id="password" placeholder="••••••••"></div>
    <button class="btn" id="loginBtn">✨ Login</button>
    <div class="footer-links"><a href="forgot-password.html">Forgot password?</a> | <a href="register.html">Create account</a></div>
    <div class="footer-links"><a href="index.html">Home</a> | <a href="register.html">Register</a> | <a href="faq.html">FAQ</a></div>
</div>
<script>
    const SUPABASE_URL = 'https://xccbmivhcbukqyplstae.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjY2JtaXZoY2J1a3F5cGxzdGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTcyNTIsImV4cCI6MjA4NjkzMzI1Mn0.lGr3cDItP1-LVJgzd5wW5gp0HsGUonuZj-T9qGL2nF0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    function showMsg(msg, isErr) { const d = document.getElementById('message'); d.style.display = 'block'; d.style.background = isErr ? '#fee2e2' : '#d4edda'; d.style.color = isErr ? '#b91c1c' : '#155724'; d.innerHTML = isErr ? `❌ ${msg}` : `✅ ${msg}`; setTimeout(()=>d.style.display='none',4000); }
    document.getElementById('loginBtn').onclick = async () => {
        const id = document.getElementById('identifier').value.trim();
        const pwd = document.getElementById('password').value;
        if(!id || !pwd) return showMsg('Fadlan buuxi labada goob', true);
        let email = id;
        if(/^\d+$/.test(id)) {
            const { data, error } = await sb.rpc('get_email_by_promo_code', { promo: id });
            if(error || !data) return showMsg('Promo code aan sax ahayn', true);
            email = data;
        }
        const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if(error) return showMsg(error.message, true);
        showMsg('Login successful! Redirecting...', false);
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
    };
</script>
</body>
</html>
