<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SAHAN DATA – Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .glass-card {
            background: rgba(20, 30, 45, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 2rem 1.8rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .logo p {
            color: #9aaec5;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #bbd4ff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.3rem 0;
            flex: 1;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #ffd966;
            border-bottom: 2px solid #ffb347;
        }

        .tab-pane {
            display: none;
            animation: fade 0.3s ease;
        }
        .tab-pane.active-pane {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(5px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ccdeff;
            margin-bottom: 0.3rem;
        }
        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 1.5rem;
            padding: 0.7rem 1rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #ffb347;
            background: rgba(0,0,0,0.6);
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(95deg, #ffb347, #ffd966);
            border: none;
            border-radius: 2rem;
            padding: 0.7rem;
            font-weight: bold;
            font-size: 1rem;
            color: #1e2a3a;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            transform: scale(1.01);
            box-shadow: 0 5px 12px rgba(255,180,50,0.3);
        }
        .info-text {
            text-align: center;
            font-size: 0.7rem;
            color: #9aaec5;
            margin-top: 1.2rem;
        }
        .info-text a {
            color: #ffd966;
            text-decoration: none;
        }
        .message {
            background: rgba(0,0,0,0.5);
            border-left: 3px solid #ffb347;
            padding: 0.5rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            margin-bottom: 1rem;
            color: #ffe3b3;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.65rem;
            color: #6b7c9e;
        }
        footer a {
            color: #ffd966;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="logo">
        <h1>⭐ SAHAN DATA ⭐</h1>
        <p>ku soo biir xidigaha suuq-geynta</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="loginTab">🔐 Login</button>
        <button class="tab-btn" data-tab="resetTab">🔄 Reset Password</button>
    </div>

    <!-- Login Tab -->
    <div id="loginTab" class="tab-pane active-pane">
        <div id="loginMessage" class="message" style="display:none;"></div>
        <div class="input-group">
            <label>📱 Promo code ama Email</label>
            <input type="text" id="loginIdentifier" placeholder="e.g., 69 ama email@example.com" autocomplete="username">
        </div>
        <div class="input-group">
            <label>🔒 Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" id="doLogin">✨ Login</button>
        <div class="info-text">
            <a href="#" id="forgotLink">Forgot password?</a> | <a href="register.html">Create account</a>
        </div>
    </div>

    <!-- Reset Password Tab -->
    <div id="resetTab" class="tab-pane">
        <div id="resetMessage" class="message" style="display:none;"></div>
        <div class="input-group">
            <label>📧 Email address</label>
            <input type="email" id="resetEmail" placeholder="your@email.com">
        </div>
        <button class="btn-login" id="doReset">📧 Send reset link</button>
        <div class="info-text">
            <a href="#" id="backToLogin">Back to Login</a>
        </div>
    </div>

    <footer>
        <a href="index.html">Home</a> | <a href="register.html">Register</a> | <a href="faq.html">FAQ</a>
    </footer>
</div>

<script>
    const SUPABASE_URL = 'https://xccbmivhcbukqyplstae.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjY2JtaXZoY2J1a3F5cGxzdGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTcyNTIsImV4cCI6MjA4NjkzMzI1Mn0.lGr3cDItP1-LVJgzd5wW5gp0HsGUonuZj-T9qGL2nF0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMessage(tab, msg, isError = false) {
        const msgDiv = document.getElementById(tab === 'login' ? 'loginMessage' : 'resetMessage');
        if (!msgDiv) return;
        msgDiv.style.display = 'block';
        msgDiv.style.color = isError ? '#ffaaaa' : '#d4ffb0';
        msgDiv.style.borderLeftColor = isError ? '#ff6666' : '#66ff66';
        msgDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
        setTimeout(() => {
            msgDiv.style.display = 'none';
        }, 5000);
    }

    async function handleLogin() {
        const identifier = document.getElementById('loginIdentifier').value.trim();
        const password = document.getElementById('loginPassword').value;
        console.log("Login attempt with identifier:", identifier);
        if (!identifier || !password) {
            console.error("Missing identifier or password");
            return showMessage('login', 'Fadlan buuxi labada goob', true);
        }
        const isEmail = identifier.includes('@');
        if (isEmail) {
            console.log("Email login with:", identifier);
            const { error } = await sb.auth.signInWithPassword({ email: identifier, password });
            if (error) {
                console.error("Email login error:", error);
                showMessage('login', error.message || 'Email or password incorrect', true);
            } else {
                console.log("Email login success");
                showMessage('login', 'Success! Redirecting...', false);
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
            }
        } else {
            console.log("Promo code login with:", identifier);
            try {
                const { data, error } = await sb.rpc('get_email_by_promo_code', { p_promo_code: identifier });
                if (error) {
                    console.error("RPC error:", error);
                    showMessage('login', `RPC error: ${error.message}`, true);
                    return;
                }
                console.log("RPC response:", data);
                let email = null;
                if (Array.isArray(data) && data.length > 0 && data[0].email) {
                    email = data[0].email;
                } else if (data && typeof data === 'object' && data.email) {
                    email = data.email;
                }
                if (!email) {
                    console.warn("No email for promo code:", identifier);
                    showMessage('login', `Promo code "${identifier}" not recognized`, true);
                    return;
                }
                console.log("Found email:", email);
                const { error: signError } = await sb.auth.signInWithPassword({ email, password });
                if (signError) {
                    console.error("SignIn error:", signError);
                    showMessage('login', signError.message || 'Incorrect password', true);
                } else {
                    console.log("Promo login success");
                    showMessage('login', 'Welcome back! Redirecting...', false);
                    setTimeout(() => window.location.href = 'dashboard.html', 1200);
                }
            } catch (err) {
                console.error("Promo login exception:", err);
                showMessage('login', 'Login failed. Check console.', true);
            }
        }
    }

    async function handleReset() {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) {
            showMessage('reset', 'Fadlan geli email-kaaga', true);
            return;
        }
        const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/update-password.html',
        });
        if (error) {
            console.error("Reset error:", error);
            showMessage('reset', error.message || 'Failed to send reset email', true);
        } else {
            showMessage('reset', 'Reset link sent to your email! Check inbox.', false);
            document.getElementById('resetEmail').value = '';
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(pane => {
            pane.classList.remove('active-pane');
        });
        document.getElementById(tabId).classList.add('active-pane');
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });
        const activeBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
        if (activeBtn) activeBtn.classList.add('active');
    }

    document.getElementById('doLogin').addEventListener('click', handleLogin);
    document.getElementById('doReset').addEventListener('click', handleReset);
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const tabId = btn.getAttribute('data-tab');
            if (tabId) switchTab(tabId);
        });
    });
    document.getElementById('forgotLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab('resetTab');
    });
    document.getElementById('backToLogin')?.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab('loginTab');
    });
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('resetEmail').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleReset();
    });
</script>
</body>
</html>
